name: BatteryMonitorMac
options:
  bundleIdPrefix: com.j4cr
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"

packages:
  BatteryShared:
    path: ../BatteryShared

targets:
  BatteryMonitorMac:
    type: application
    platform: macOS
    scheme: {}
    sources:
      - Sources
      - Resources/Assets.xcassets
    dependencies:
      - package: BatteryShared
      - target: iPhoneBatteryWidgetExtension
    settings:
      base:
        INFOPLIST_FILE: Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.j4cr.BatteryMonitorMac
        MARKETING_VERSION: "2.0.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.9"
        ENABLE_APP_SANDBOX: false
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: Resources/BatteryMonitorMac.entitlements

  iPhoneBatteryWidgetExtension:
    type: app-extension
    platform: macOS
    scheme: {}
    sources:
      - Widget
    dependencies:
      - package: BatteryShared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.j4cr.BatteryMonitorMac.widget
        MARKETING_VERSION: "2.0.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_ENTITLEMENTS: Resources/iPhoneBatteryWidget.entitlements
        INFOPLIST_FILE: Widget/Info.plist
