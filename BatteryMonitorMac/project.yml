name: BatteryMonitorMac
options:
  bundleIdPrefix: com.j4cr
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"

packages:
  BatteryShared:
    path: ../BatteryShared

targets:
  BatteryMonitorMac:
    type: application
    platform: macOS
    sources:
      - Sources
      - Resources/Assets.xcassets
    dependencies:
      - package: BatteryShared
    settings:
      base:
        INFOPLIST_FILE: Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.j4cr.BatteryMonitorMac
        MARKETING_VERSION: "2.0.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.9"
        CODE_SIGN_IDENTITY: "-"
        ENABLE_APP_SANDBOX: false
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: Resources/BatteryMonitorMac.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.server: true
        com.apple.security.network.client: true
