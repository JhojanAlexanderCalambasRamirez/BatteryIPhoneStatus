name: BatterySenderIOS
options:
  bundleIdPrefix: com.j4cr
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

packages:
  BatteryShared:
    path: ../BatteryShared

targets:
  BatterySenderIOS:
    type: application
    platform: iOS
    sources:
      - Sources
      - Resources/Assets.xcassets
    dependencies:
      - package: BatteryShared
    settings:
      base:
        INFOPLIST_FILE: Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.j4cr.BatterySenderIOS
        MARKETING_VERSION: "2.0.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
